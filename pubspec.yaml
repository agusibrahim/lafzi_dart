name: lafzi_dart
description: Al-Quran phonetic search engine. Search Quran verses by Latin transliteration using trigram indexing and phonetic matching. Pure Dart, works with Flutter.
version: 1.0.0
homepage: https://github.com/agusibrahim/lafzi_dart

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  sqlite3: ^2.4.0

dev_dependencies:
  test: ^1.25.0