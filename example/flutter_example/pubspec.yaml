name: lafzi_example
description: "Flutter example for lafzi_dart Quran search."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  lafzi_dart:
    path: ../../
  path_provider: ^2.1.0
  sqlite3_flutter_libs: ^0.5.0
  cupertino_icons: ^1.0.8

flutter:
  uses-material-design: true
  fonts:
    - family: MeQuran
      fonts:
        - asset: assets/fonts/me_quran.ttf